name: Blacksmith Testbox

on:
  workflow_dispatch:
    inputs:
      testbox_id:
        type: string
        description: "Testbox session ID"
        required: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.10"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: "check"
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Begin Testbox
        uses: useblacksmith/begin-testbox@d0e04585c26905fdd92c94a09c159544c7ee1b67
        with:
          testbox_id: ${{ inputs.testbox_id }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore Bun install cache
        id: bun-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Save Bun install cache
        if: steps.bun-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ~/.bun/install/cache
          key: ${{ steps.bun-cache.outputs.cache-primary-key }}

      - name: Prepare Testbox shell
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=50 origin "+refs/heads/main:refs/remotes/origin/main"

          bun_bin="$(command -v bun)"
          sudo ln -sf "$bun_bin" /usr/local/bin/bun

          if command -v bunx >/dev/null 2>&1; then
            sudo ln -sf "$(command -v bunx)" /usr/local/bin/bunx
          fi

          node_bin="$(dirname "$(node -p 'process.execPath')")"
          sudo ln -sf "$node_bin/node" /usr/local/bin/node
          sudo ln -sf "$node_bin/npm" /usr/local/bin/npm
          sudo ln -sf "$node_bin/npx" /usr/local/bin/npx

      - name: Run Testbox
        uses: useblacksmith/run-testbox@5ca05834db1d3813554d1dd109e5f2087a8d7cbc
        if: always()
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
