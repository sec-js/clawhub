name: Setup Bun
description: Install the pinned Bun runtime and workspace dependencies.

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      with:
        bun-version: 1.3.10

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
